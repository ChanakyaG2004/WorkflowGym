services:
  - type: web
    name: workflowgym-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workflowgym-db
          property: connectionString
      - key: AUTO_SEED_DEMO
        value: "true"

databases:
  - name: workflowgym-db
    plan: free
