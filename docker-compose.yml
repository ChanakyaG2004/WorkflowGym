services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: workflowgym
      POSTGRES_PASSWORD: workflowgym
      POSTGRES_DB: workflowgym
    ports:
      - "5432:5432"
    volumes:
      - workflowgym_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflowgym -d workflowgym"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://workflowgym:workflowgym@db:5432/workflowgym
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  workflowgym_postgres:
